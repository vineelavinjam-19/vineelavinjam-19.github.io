<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lehengas | Madhurakshi</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; background-color: #fdf6ee; }
.logo-text { font-family: 'Cinzel', serif; letter-spacing: 3px; color: #8b0000; }
.heading { font-family: 'Playfair Display', serif; }

/* Instagram-style square images */
.fixed-img {
    width: 100%;
    max-width: 400px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 0.5rem;
    margin: 0 auto;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow-md">
    <h1 class="logo-text text-xl">MADHURAKSHI</h1>
    <a href="index.html" class="text-red-800">← Home</a>
</div>

<!-- HEADING -->
<div class="text-center py-10">
    <h1 class="heading text-3xl text-red-800">Lehengas Collection</h1>
    <p class="text-[#6b4a34]">Timeless elegance for every celebration.</p>
</div>

<!-- PRODUCTS GRID -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-6 pb-10">

    <!-- Bridal Lehenga -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">Bridal Lehenga</h2>
        <p class="text-center text-[#6b4a34]">₹8,999</p>
    </div>

    <!-- Festive Lehenga -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1593032465171-8d1d6a8f9b10">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">Festive Lehenga</h2>
        <p class="text-center text-[#6b4a34]">₹5,499</p>
    </div>

    <!-- Party Lehenga -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1622396636133-ba43f812bc35">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">Party Lehenga</h2>
        <p class="text-center text-[#6b4a34]">₹6,199</p>
    </div>

    <!-- Designer Lehenga -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">Designer Lehenga</h2>
        <p class="text-center text-[#6b4a34]">₹9,499</p>
    </div>

</div>

</body>
</html>
