<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dresses | Madhurakshi</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body { 
    font-family: 'Poppins', sans-serif; 
    background-color: #fdf6ee; 
}

.logo-text { 
    font-family: 'Cinzel', serif; 
    letter-spacing: 3px; 
    color: #8b0000; 
}

.heading { 
    font-family: 'Playfair Display', serif; 
}

/* Instagram-style square images */
.fixed-img {
    width: 100%;          /* full card width */
    max-width: 400px;     /* like IG post */
    aspect-ratio: 1 / 1;  /* square */
    object-fit: cover;    /* fill square nicely */
    border-radius: 0.5rem;
    margin: 0 auto;       /* center inside card */
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="flex justify-between items-center p-4 bg-white shadow-md">
    <h1 class="logo-text text-xl">MADHURAKSHI</h1>
    <a href="index.html" class="text-red-800">← Home</a>
</div>

<!-- HEADING -->
<div class="text-center py-10">
    <h1 class="heading text-3xl text-red-800">Dresses Collection</h1>
    <p class="text-[#6b4a34]">Modern elegance for every occasion.</p>
</div>

<!-- PRODUCTS GRID -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 px-6 pb-10">

    <!-- Evening Dress -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1593032465171-8d1d6a8f9b10">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">
            Evening Dress
        </h2>
        <p class="text-center text-[#6b4a34]">₹2,999</p>
    </div>

    <!-- Casual Dress -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1622396636133-ba43f812bc35">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">
            Casual Dress
        </h2>
        <p class="text-center text-[#6b4a34]">₹2,199</p>
    </div>

    <!-- Party Dress -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">
            Party Dress
        </h2>
        <p class="text-center text-[#6b4a34]">₹3,499</p>
    </div>

    <!-- Summer Dress -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">
            Summer Dress
        </h2>
        <p class="text-center text-[#6b4a34]">₹2,799</p>
    </div>

    <!-- Evening Gown -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1583391733956-6c78276477e2">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">
            Evening Gown
        </h2>
        <p class="text-center text-[#6b4a34]">₹4,199</p>
    </div>

    <!-- Cocktail Dress -->
    <div class="bg-white p-4 rounded-xl shadow hover:scale-105 transition text-center">
        <img class="fixed-img" src="https://images.unsplash.com/photo-1622396636133-ba43f812bc35">
        <h2 class="mt-2 text-center font-semibold text-[#8b0000]">
            Cocktail Dress
        </h2>
        <p class="text-center text-[#6b4a34]">₹3,899</p>
    </div>

</div>

</body>
</html>
